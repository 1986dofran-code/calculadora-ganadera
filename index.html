<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Ganadera</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
<header><h1 class="titulo">Calculadora Ganadera</h1></header>
<nav>
    <a href="#info">Información</a>
    <a href="#calculadora">Calculadora</a>
    <a href="#contacto">Contacto</a>
</nav>
<main>
<section id="info"> ... </section>

<section id="calculadora">
    <h2>Opciones de Producción</h2>
    <label>Selecciona el animal:</label>
    <select id="animal">
        <option value="">-- Elegir --</option>
        <option value="Vaca">🐄 Vaca</option>
        <option value="Cerdo">🐖 Cerdo</option>
        <option value="Pollo">🐔 Pollo</option>
    </select>

    <button id="btnCantidad" type="button" class="boton-opcion">2. Habilitar cantidad</button>

    <label>Tipo de producción:</label>
    <input type="text" id="produccion" readonly placeholder="Se llenará automáticamente">

    <button id="btnProducto" type="button" class="boton-opcion">3. Mostrar producto</button>

    <label>Cantidad producida por día:</label>
    <input type="number" id="cantidad" min="0" placeholder="Ej: 50" disabled>

    <button id="btnPrecio" type="button" class="boton-opcion">4. Habilitar precio</button>

    <label>Precio por unidad:</label>
    <input type="number" id="precio" min="0" step="0.01" placeholder="Ej: 12.50" disabled>

    <button id="btnCopiarPrecio" type="button" class="boton-opcion">Copiar precio</button>

    <button id="btnCalcular" type="button" class="boton-opcion">5. Calcular total</button>

    <p id="respuesta"></p>
</section>

<section id="contacto"> ... </section>
</main>

<footer><p>Proyecto Calculadora Ganadera - 2026</p></footer>
<script src="script.js"></script>
</body>
</html>

<section id="contacto">
    <h2>Contacto</h2>

    <form onsubmit="mostrarDatos(event)">
        <label>Nombre:</label>
        <input type="text" id="nombre" required>

        <label>Teléfono:</label>
        <input type="tel" id="telefono" required placeholder="Ej: +1234567890">

        <label>Correo:</label>
        <input type="email" id="correo" required>

        <button type="submit">Enviar</button>
    </form>

    <a href="https://wa.me/3044247299?text=Hola, quiero información sobre la calculadora ganadera" target="_blank" class="boton-opcion">Contactar por WhatsApp</a>

    <p id="mensaje"></p>
</section>
